# Docker socket path
docker_host: unix:///var/run/docker.sock

# Label prefix used on MC containers
label_prefix: mc-bridge

# Default RCON port if not overridden via mc-bridge.rcon-port label
default_rcon_port: 25575

# Message formatting in Minecraft (tellraw JSON colors)
prefix_text: "[Matrix]"
prefix_color: light_purple
sender_color: aqua
message_color: white

# Provisioning secret — preferably set via PROVISIONING_SECRET env variable
# instead of here, to avoid the secret ending up in the config file
provisioning_secret: ""

# Avatar API URL (%s is replaced with MC username)
# Starlight Skins supports both Java and Bedrock/Floodgate players
avatar_api_url: "https://starlightskins.lunareclipse.studio/render/default/%s/bust"

# Bridge all events (join/leave/death/advancement) in addition to chat.
# Set to false to only bridge chat messages.
bridge_all_events: true

# ─── Recommended settings in the bridge section of config.yaml ───
#
# The bridge already adds the sender name in the tellraw command,
# so relay message_formats should NOT include the sender name (to avoid double display).
# Change under bridge.relay.message_formats:
#
#   message_formats:
#       m.text: "{{ .Message }}"
#       m.notice: "{{ .Message }}"
#       m.emote: "* {{ .Message }}"
#       m.file: "sent a file"
#       m.image: "sent an image"
#       m.audio: "sent audio"
#       m.video: "sent a video"
#       m.location: "sent a location"
#
# To bridge messages from bots (m.notice), set:
#   bridge_notices: true
